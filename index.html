<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 Ma ToDo App</h1>
    <div class="input-group">
      <input type="text" id="task-input" placeholder="Ajouter une nouvelle tâche">
      <button onclick="addTask()">Ajouter</button>
    </div>

    <div class="filters">
      <button onclick="filterTasks('all')">Toutes</button>
      <button onclick="filterTasks('done')">Terminées</button>
      <button onclick="filterTasks('todo')">À faire</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
